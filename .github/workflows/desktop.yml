name: Desktop Build

# Three-platform Tauri build matrix. Verifies the desktop app compiles on
# Linux / macOS / Windows and uploads each runner's bundle artefacts so we
# can sanity-check installers without spinning up the actual platforms.
#
# Trigger:
#   - manual (Actions tab → Run workflow)
#   - push to a tag matching desktop-v*  (e.g. desktop-v0.1.0)

on:
  workflow_dispatch: {}
  push:
    tags:
      - 'desktop-v*'

jobs:
  build:
    name: build · ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux
            bundle_glob: 'apps/desktop/src-tauri/target/release/bundle/{deb,appimage,rpm}/*'
          - os: macos-latest
            label: macos
            bundle_glob: 'apps/desktop/src-tauri/target/release/bundle/{dmg,macos}/*'
          - os: windows-latest
            label: windows
            bundle_glob: 'apps/desktop/src-tauri/target/release/bundle/{nsis,msi}/*'
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux system deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            libsoup-3.0-dev \
            librsvg2-dev \
            libssl-dev \
            libxdo-dev \
            libayatana-appindicator3-dev \
            file \
            build-essential \
            pkg-config

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry + git
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-${{ matrix.os }}-${{ hashFiles('apps/desktop/src-tauri/Cargo.lock') }}
          restore-keys: |
            cargo-${{ matrix.os }}-

      - name: Cache Tauri target
        uses: actions/cache@v4
        with:
          path: apps/desktop/src-tauri/target
          key: tauri-target-${{ matrix.os }}-${{ hashFiles('apps/desktop/src-tauri/Cargo.lock', 'apps/desktop/src-tauri/src/**', 'apps/desktop/src-tauri/build.rs') }}
          restore-keys: |
            tauri-target-${{ matrix.os }}-

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install desktop deps
        working-directory: apps/desktop
        run: bun install --frozen-lockfile

      - name: Install root deps (for vitest)
        run: bun install --frozen-lockfile

      - name: Run vitest (touched suites only)
        # Force bash shell — git-for-Windows ships it, and PowerShell doesn't
        # honor the trailing-backslash line continuations we use below, which
        # would silently invoke `vitest run` with no file args and then try to
        # execute `cli.test.ts` as a separate command.
        shell: bash
        run: |
          bun x vitest run \
            cli.test.ts \
            agent-config.test.ts \
            doctor.test.ts \
            account-remove.test.ts \
            daemon-kill.test.ts \
            memory.test.ts \
            update.test.ts \
            update.e2e.test.ts \
            src/daemon/onboarding.test.ts \
            apps/desktop/src/view.test.ts

      - name: Tauri build
        working-directory: apps/desktop
        run: bun run tauri build
        env:
          # Use ad-hoc signing on macOS ("-" tells codesign to sign with an
          # ephemeral identity instead of looking for a Developer ID in the
          # keychain). This produces a runnable .app/.dmg without requiring
          # Apple Developer credentials in CI. Setting this to '' makes Tauri
          # fall through to default signing which fails when no identity is
          # provisioned.
          APPLE_SIGNING_IDENTITY: '-'

      - name: Upload bundle artefacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: wechat-cc-${{ matrix.label }}
          path: ${{ matrix.bundle_glob }}
          if-no-files-found: warn
          retention-days: 14

  # Aggregate the three platform bundles into a single GitHub Release.
  # Only runs on `desktop-v*` tag pushes (skipped on workflow_dispatch / non-tag
  # runs since those are validation builds without a meaningful version).
  # Creates the release as a *draft* — review notes + flip to published manually.
  release:
    name: Draft GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/desktop-v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout (for release notes file)
        uses: actions/checkout@v4

      - name: Download all platform bundles
        uses: actions/download-artifact@v4
        with:
          path: bundles
          pattern: wechat-cc-*
          merge-multiple: false

      - name: Flatten bundles for upload
        run: |
          mkdir -p release-files
          find bundles -type f \( -name '*.dmg' -o -name '*.app.tar.gz' -o -name '*.deb' -o -name '*.AppImage' -o -name '*.rpm' -o -name '*.exe' -o -name '*.msi' -o -name '*.nsis.zip' \) -exec cp -v {} release-files/ \;
          ls -la release-files

      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          name: Desktop ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          body_path: docs/releases/${{ github.ref_name }}.md
          files: release-files/*
          fail_on_unmatched_files: false
