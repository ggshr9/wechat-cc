name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    name: build · ${{ matrix.os }}
    strategy:
      # Let every platform complete so we can see which ones break at a
      # glance instead of the first failure cancelling the rest.
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build server.ts
        run: bun build server.ts --target=node --outfile=dist/server.js

      - name: Build cli.ts
        run: bun build cli.ts --target=node --outfile=dist/cli.js

      - name: Build docs.ts
        run: bun build docs.ts --target=node --outfile=dist/docs.js

      - name: Build setup.ts
        run: bun build setup.ts --target=node --outfile=dist/setup.js

      - name: Build log-viewer.ts
        run: bun build log-viewer.ts --target=node --outfile=dist/log-viewer.js

      - name: Run tests
        run: npx vitest run
